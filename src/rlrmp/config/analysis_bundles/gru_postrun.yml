schema_id: feedbax.spec.analysis_bundle
schema_version: feedbax.spec.analysis_bundle.v3
name: gru_postrun
description: Standard GRU post-run diagnostic bundle for rlrmp experiments.
predicate:
  manifest_kind: TrainingRunManifest
  metadata_equals:
    gru_postrun_candidate: true
metadata:
  primary_contract: feedbax_analysis_bundle
  archived_parity_oracle:
    source_experiment: 30f2313
    role: authored_standard_certificate_source_identity
  output_conventions:
    tracked_notes: results/{experiment}/notes
    bulk_artifacts: _artifacts/{experiment}
  scientific_schema_owner: rlrmp
  sibling_owned_lenses:
    - feedback_quality
    - robustness_phenotype_aggregation
    - output_feedback_bridge_diagnostics
    - training_diagnostics
stages:
  - name: standard_certificate
    kind: analysis
    mode: grouped
    analysis_type: rlrmp.certificate.gru_standard
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      include_reference: true
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-bridge-standard-certificate
        required: true
  - name: perturbation_bank_eval
    kind: evaluation
    mode: grouped
    evaluation_type: rlrmp.eval.perturbation_response_bank
    states_custody: cache
    local_params:
      schema_id: rlrmp.eval.perturbation_response_bank.params
      schema_version: rlrmp.eval.perturbation_response_bank.params.v2
      legacy_payload_mode: true
      bank_params: &perturbation_bank_params
        mode: raw
        families:
          - command_input_pulse
          - target_aligned_lateral_command_load_pulse
          - process_epsilon_force_state_xy
          - target_stream_jump
      checkpoint_bank_ref:
        kind: CheckpointSelectionManifest
        id: gru_postrun_bundle_placeholder_bank
      response_tensors:
        runs: {}
      bundle_contract:
        primary: feedbax_analysis_bundle
        role: shared_perturbation_response_eval
        states_custody: cache
    outputs:
      - role: manifest
        required: true
  - name: perturbation_class_command_input_pulse
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    local_params:
      family: command_input_pulse
      bank_params: *perturbation_bank_params
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_class_lateral_command_load
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    local_params:
      family: target_aligned_lateral_command_load_pulse
      bank_params: *perturbation_bank_params
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_class_process_force_state
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    local_params:
      family: process_epsilon_force_state_xy
      bank_params: *perturbation_bank_params
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_class_target_stream_jump
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    local_params:
      family: target_stream_jump
      bank_params: *perturbation_bank_params
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_bank_aggregate
    kind: analysis
    mode: grouped
    depends_on:
      - perturbation_class_command_input_pulse
      - perturbation_class_lateral_command_load
      - perturbation_class_process_force_state
      - perturbation_class_target_stream_jump
    analysis_type: rlrmp.perturbation_bank_aggregate
    local_params:
      bank_params: *perturbation_bank_params
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-gru-perturbation-response-manifest
        required: true
  - name: response_norm_payload
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_aggregate]
    analysis_type: rlrmp.response_norm_comparison
    local_params:
      metrics: [delta_position, delta_action]
      condition_classes: [class_a, class_b]
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-response-norm-comparison-payload
        required: true
  - name: response_norm_figure
    kind: figure
    mode: grouped
    depends_on: [response_norm_payload]
    figure:
      name: gru-postrun-response-norm-comparison
      template: rlrmp.response_norm_comparison
      slot_bindings:
        norm_bands:
          name: response-norm-bands
          constructor: rlrmp.response_norm_bands
          data:
            payload: {item: manifest, path: metadata.figure_payload}
            metric: {item: metric}
            condition_class: {item: condition_class}
        norm_bars:
          name: response-norm-bars
          constructor: rlrmp.response_norm_bars
          required: false
          data:
            payload: {item: manifest, path: metadata.figure_payload}
            metric: {item: metric}
            condition_class: {item: condition_class}
      panels:
        - name: response_norm
          title: {item: metric}
          axes_labels: {x: Time (s), y: Response norm}
      facet_bindings:
        metric: {item: manifest, path: metadata.figure_payload.intrinsic_axes.metric}
        condition_class: {item: manifest, path: metadata.figure_payload.intrinsic_axes.condition_class}
      figure_routing:
        package: rlrmp
        experiment: gru_postrun
        topic: response_norm_comparison
        extra_packages: [rlrmp]
        render_format: html
      metadata:
        schema_id: rlrmp.figure_data.response_norm_comparison
        schema_version: rlrmp.figure_data.response_norm_comparison.v1
        parity_oracle: results/74fac80/data_products/gru_postrun_figure_parity.json
    outputs:
      - role: figure_render
        required: true
  - name: evaluation_diagnostics
    kind: materialization
    mode: grouped
    analysis_type: rlrmp.feedback_quality.evaluation_diagnostics
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      materialize_evaluation_diagnostics: false
    run_condition:
      kind: any
      exprs:
        - kind: compare
          item: evaluation_run
          op: exists
        - kind: compare
          item: params
          path: materialize_evaluation_diagnostics
          op: eq
          value: true
    outputs:
      - role: rlrmp-feedback-quality-evaluation-diagnostics-status
        required: false
  - name: objective_comparator
    kind: materialization
    mode: grouped
    analysis_type: rlrmp.feedback_quality.objective_comparator
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      materialize_objective_comparator: false
    run_condition:
      kind: any
      exprs:
        - kind: compare
          item: evaluation_run
          op: exists
        - kind: compare
          item: params
          path: materialize_objective_comparator
          op: eq
          value: true
    outputs:
      - role: rlrmp-feedback-quality-objective-comparator-status
        required: false
  - name: perturbation_response
    kind: materialization
    mode: grouped
    analysis_type: rlrmp.feedback_quality.perturbation_response
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      materialize_perturbation_response: false
    run_condition:
      kind: any
      exprs:
        - kind: compare
          item: evaluation_run
          op: exists
        - kind: compare
          item: params
          path: materialize_perturbation_response
          op: eq
          value: true
    outputs:
      - role: rlrmp-feedback-quality-perturbation-response-status
        required: false
      - role: rlrmp-feedback-quality-perturbation-response-manifest
        required: false
  - name: feedback_ablation
    kind: materialization
    mode: grouped
    analysis_type: rlrmp.feedback_quality.feedback_ablation
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      materialize_feedback_ablation: false
    run_condition:
      kind: any
      exprs:
        - kind: compare
          item: evaluation_run
          op: exists
        - kind: compare
          item: params
          path: materialize_feedback_ablation
          op: eq
          value: true
    outputs:
      - role: rlrmp-feedback-quality-feedback-ablation-status
        required: false
  - name: perturbation_calibration
    kind: materialization
    mode: grouped
    analysis_type: rlrmp.feedback_quality.perturbation_calibration
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      materialize_perturbation_calibration: false
    run_condition:
      kind: compare
      item: params
      path: materialize_perturbation_calibration
      op: eq
      value: true
    outputs:
      - role: rlrmp-feedback-quality-perturbation-calibration-status
        required: false
  - name: response_norm_plots
    kind: materialization
    mode: grouped
    include_bundle_inputs: true
    depends_on_roles:
      - stage: perturbation_response
        role: rlrmp-feedback-quality-perturbation-response-manifest
        required: false
    analysis_type: rlrmp.feedback_quality.response_norm_plots
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      materialize_response_norm_plots: false
    run_condition:
      kind: all
      exprs:
        - kind: compare
          item: params
          path: materialize_response_norm_plots
          op: eq
          value: true
        - kind: compare
          item: rlrmp-feedback-quality-perturbation-response-manifest
          op: exists
    outputs:
      - role: rlrmp-feedback-quality-response-norm-plots-status
        required: false
  - name: feedback_quality_lens
    kind: materialization
    mode: grouped
    include_bundle_inputs: true
    depends_on:
      - evaluation_diagnostics
      - objective_comparator
      - perturbation_response
      - feedback_ablation
      - perturbation_calibration
      - response_norm_plots
    depends_on_roles:
      - stage: evaluation_diagnostics
        role: rlrmp-feedback-quality-evaluation-diagnostics-status
        required: false
      - stage: objective_comparator
        role: rlrmp-feedback-quality-objective-comparator-status
        required: false
      - stage: perturbation_response
        role: rlrmp-feedback-quality-perturbation-response-status
        required: false
      - stage: feedback_ablation
        role: rlrmp-feedback-quality-feedback-ablation-status
        required: false
      - stage: perturbation_calibration
        role: rlrmp-feedback-quality-perturbation-calibration-status
        required: false
      - stage: response_norm_plots
        role: rlrmp-feedback-quality-response-norm-plots-status
        required: false
    analysis_type: rlrmp.feedback_quality_lens
    local_params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
    run_condition:
      kind: all
      exprs:
        - kind: compare
          item: rlrmp-feedback-quality-evaluation-diagnostics-status
          op: exists
        - kind: compare
          item: rlrmp-feedback-quality-objective-comparator-status
          op: exists
        - kind: compare
          item: rlrmp-feedback-quality-perturbation-response-status
          op: exists
        - kind: compare
          item: rlrmp-feedback-quality-feedback-ablation-status
          op: exists
        - kind: compare
          item: rlrmp-feedback-quality-perturbation-calibration-status
          op: exists
        - kind: compare
          item: rlrmp-feedback-quality-response-norm-plots-status
          op: exists
    outputs:
      - role: rlrmp-feedback-quality-lens
        required: false
  - name: robustness_phenotype_aggregation
    kind: materialization
    depends_on: [standard_certificate, perturbation_bank_aggregate]
    outputs:
      - role: rlrmp-robustness-phenotype-aggregation
        required: false
    not_applicable_reason: "Sibling-owned by 769aea6; not part of this bundle migration."
  - name: output_feedback_bridge_diagnostics
    kind: materialization
    depends_on: [standard_certificate]
    outputs:
      - role: rlrmp-output-feedback-bridge-diagnostics
        required: false
    not_applicable_reason: "Sibling-owned by c4416c5; not part of this bundle migration."
  - name: training_diagnostics
    kind: materialization
    depends_on: [feedback_quality_lens]
    outputs:
      - role: rlrmp-training-diagnostics
        required: false
    not_applicable_reason: "Sibling-owned by 0e3223d; not part of this bundle migration."
  - name: postrun_report
    kind: report
    mode: grouped
    depends_on:
      - standard_certificate
      - perturbation_bank_aggregate
      - response_norm_figure
      - objective_comparator
      - feedback_quality_lens
    report_type: rlrmp.report.gru_postrun_summary
    local_params:
      schema_id: rlrmp.report.gru_postrun_summary.params
      schema_version: rlrmp.report.gru_postrun_summary.params.v1
      title: GRU Postrun Report
      source_artifact_roles:
        - rlrmp-bridge-standard-certificate
        - rlrmp-gru-perturbation-response-manifest
        - rlrmp-feedback-quality-objective-comparator-status
        - rlrmp-feedback-quality-lens
      include_json_artifact: true
      narrative: Feedbax-custody report render for the tracked GRU postrun notes.
    outputs:
      - role: report_render
        required: true
      - role: rlrmp-gru-postrun-report-render
        required: false
  - name: bridge_certificate_report
    kind: report
    mode: grouped
    depends_on: [standard_certificate]
    report_type: rlrmp.report.bridge_certificate_notes
    local_params:
      schema_id: rlrmp.report.bridge_certificate_notes.params
      schema_version: rlrmp.report.bridge_certificate_notes.params.v1
      title: Bridge Certificate Notes
      source_artifact_roles:
        - rlrmp-bridge-standard-certificate
      include_json_artifact: true
      narrative: Feedbax-custody report constructed from structured standard-certificate rows.
    outputs:
      - role: report_render
        required: true
      - role: rlrmp-bridge-certificate-report-render
        required: false
