name: gru_postrun
description: Standard GRU post-run diagnostic bundle for rlrmp experiments.
predicate:
  manifest_kind: TrainingRunManifest
  metadata_equals:
    gru_postrun_candidate: true
metadata:
  primary_contract: feedbax_analysis_bundle
  legacy_regeneration_contract: compatibility_only
  output_conventions:
    tracked_notes: results/{experiment}/notes
    bulk_artifacts: _artifacts/{experiment}
  scientific_schema_owner: rlrmp
  sibling_owned_lenses:
    - feedback_quality
    - robustness_phenotype_aggregation
    - output_feedback_bridge_diagnostics
    - training_diagnostics
stages:
  - name: postrun_diagnostics
    kind: analysis
    mode: grouped
    analysis_type: rlrmp.gru_postrun
    requested_outputs: [gru_postrun_materialization]
    params:
      experiment_metadata_key: rlrmp_experiment
      output_tag: validation_selected
      use_validation_selected_checkpoints: true
      include_reference: true
      include_objective_comparator: true
      include_map_decomposition: true
      include_perturbation_response: false
      include_feedback_ablation: true
      bundle_contract:
        primary: feedbax_analysis_bundle
        legacy_regeneration_spec: compatibility_only
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-gru-postrun-manifest
        required: true
      - role: rlrmp-gru-checkpoint-selection-manifest
        required: false
      - role: rlrmp-gru-standard-certificate-manifest
        required: false
      - role: rlrmp-gru-standard-certificate-note
        required: false
      - role: rlrmp-gru-evaluation-diagnostics-manifest
        required: false
      - role: rlrmp-gru-pilot-figure-summary
        required: false
      - role: rlrmp-gru-objective-comparator-manifest
        required: false
      - role: rlrmp-gru-objective-comparator-note
        required: false
      - role: rlrmp-gru-map-decomposition-manifest
        required: false
      - role: rlrmp-gru-map-decomposition-note
        required: false
      - role: rlrmp-gru-perturbation-response-manifest
        required: false
      - role: rlrmp-gru-perturbation-response-note
        required: false
      - role: rlrmp-gru-feedback-ablation-manifest
        required: false
      - role: rlrmp-gru-feedback-ablation-note
        required: false
      - role: rlrmp-gru-postrun-legacy-regeneration-spec
        required: false
  - name: perturbation_bank_eval
    kind: evaluation
    mode: grouped
    evaluation_type: rlrmp.eval.perturbation_response_bank
    states_custody: cache
    params:
      schema_id: rlrmp.eval.perturbation_response_bank.params
      schema_version: rlrmp.eval.perturbation_response_bank.params.v2
      legacy_payload_mode: true
      checkpoint_bank_ref:
        kind: CheckpointSelectionManifest
        id: gru_postrun_bundle_placeholder_bank
      perturbation_battery:
        bank_id: gru_postrun_selected_perturbation_classes
        perturbations:
          - perturbation_id: command_input_pulse__bundle_placeholder
            channel: command_input
            family: command_input_pulse
            amplitude: 1.0
            units: N
            axis: x
            basis: command_cartesian_force_xy
            sign: 1
            timing:
              start_time_index: 1
              duration_steps: 1
            adapter: feedbax.additive_channel_adapter.command_input
            description: Bundle placeholder row for command-input pulse class.
          - perturbation_id: target_aligned_lateral_command_load_pulse__bundle_placeholder
            channel: command_input
            family: target_aligned_lateral_command_load_pulse
            amplitude: 1.0
            units: N
            axis: y
            basis: target_aligned_radial_tangential_force
            sign: 1
            timing:
              start_time_index: 1
              duration_steps: 1
            adapter: feedbax.additive_channel_adapter.command_input
            description: Bundle placeholder row for lateral command-load class.
          - perturbation_id: process_epsilon_force_state_xy__bundle_placeholder
            channel: process_epsilon
            family: process_epsilon_force_state_xy
            amplitude: 0.01
            units: epsilon
            axis: y
            basis: cs_lss_process_epsilon_current_physical_block
            sign: 1
            timing:
              start_time_index: 1
              duration_steps: 1
            adapter: "task_trial_spec.inputs['epsilon']"
            description: Bundle placeholder row for force-state process-epsilon class.
          - perturbation_id: target_stream_jump__bundle_placeholder
            channel: target_stream
            family: target_stream_jump
            amplitude: 0.01
            units: m
            axis: x
            basis: target_cartesian_xy
            sign: 1
            timing:
              start_time_index: 1
              duration_steps: 1
            adapter: task_trial_spec.target
            description: Bundle placeholder row for target-stream jump class.
      response_tensors:
        runs: {}
      bundle_contract:
        primary: feedbax_analysis_bundle
        role: shared_perturbation_response_eval
        states_custody: cache
    outputs:
      - role: manifest
        required: true
  - name: perturbation_class_command_input_pulse
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    params:
      family: command_input_pulse
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_class_lateral_command_load
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    params:
      family: target_aligned_lateral_command_load_pulse
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_class_process_force_state
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    params:
      family: process_epsilon_force_state_xy
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_class_target_stream_jump
    kind: analysis
    mode: grouped
    depends_on: [perturbation_bank_eval]
    analysis_type: rlrmp.perturbation_class_response
    params:
      family: target_stream_jump
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-perturbation-class-response
        required: true
  - name: perturbation_bank_aggregate
    kind: analysis
    mode: grouped
    depends_on:
      - perturbation_class_command_input_pulse
      - perturbation_class_lateral_command_load
      - perturbation_class_process_force_state
      - perturbation_class_target_stream_jump
    analysis_type: rlrmp.perturbation_bank_aggregate
    params:
      bank_mode: raw
    outputs:
      - role: manifest
        required: true
      - role: rlrmp-gru-perturbation-response-manifest
        required: true
  - name: postrun_report
    kind: report
    mode: grouped
    depends_on: [postrun_diagnostics]
    report_type: rlrmp.report.gru_postrun_summary
    params:
      schema_id: rlrmp.report.gru_postrun_summary.params
      schema_version: rlrmp.report.gru_postrun_summary.params.v1
      title: GRU Postrun Report
      source_artifact_roles:
        - rlrmp-gru-standard-certificate-note
        - rlrmp-gru-objective-comparator-note
        - rlrmp-gru-map-decomposition-note
        - rlrmp-gru-perturbation-response-note
        - rlrmp-gru-feedback-ablation-note
      include_json_artifact: true
      narrative: Feedbax-custody report render for the tracked GRU postrun notes.
    outputs:
      - role: report_render
        required: true
      - role: rlrmp-gru-postrun-report-render
        required: false
  - name: bridge_certificate_report
    kind: report
    mode: grouped
    depends_on: [postrun_diagnostics]
    report_type: rlrmp.report.bridge_certificate_notes
    params:
      schema_id: rlrmp.report.bridge_certificate_notes.params
      schema_version: rlrmp.report.bridge_certificate_notes.params.v1
      title: Bridge Certificate Notes
      source_artifact_roles:
        - rlrmp-gru-standard-certificate-note
        - rlrmp-bridge-standard-certificate-note
      include_json_artifact: true
      narrative: Feedbax-custody report render for standard-certificate Markdown.
    outputs:
      - role: report_render
        required: true
      - role: rlrmp-bridge-certificate-report-render
        required: false
  - name: feedback_quality_lens
    kind: materialization
    depends_on: [postrun_diagnostics]
    outputs:
      - role: rlrmp-feedback-quality-lens
        required: false
    not_applicable_reason: "Sibling-owned by af77a06; not part of this bundle migration."
  - name: robustness_phenotype_aggregation
    kind: materialization
    depends_on: [postrun_diagnostics]
    outputs:
      - role: rlrmp-robustness-phenotype-aggregation
        required: false
    not_applicable_reason: "Sibling-owned by 769aea6; not part of this bundle migration."
  - name: output_feedback_bridge_diagnostics
    kind: materialization
    depends_on: [postrun_diagnostics]
    outputs:
      - role: rlrmp-output-feedback-bridge-diagnostics
        required: false
    not_applicable_reason: "Sibling-owned by c4416c5; not part of this bundle migration."
  - name: training_diagnostics
    kind: materialization
    depends_on: [postrun_diagnostics]
    outputs:
      - role: rlrmp-training-diagnostics
        required: false
    not_applicable_reason: "Sibling-owned by 0e3223d; not part of this bundle migration."
  - name: archive_only_entrypoints
    kind: materialization
    depends_on: [postrun_diagnostics]
    outputs:
      - role: rlrmp-gru-postrun-historical-script
        required: false
    skip_reason: "Historical scripts remain archive-only once the Feedbax bundle is the run contract."
