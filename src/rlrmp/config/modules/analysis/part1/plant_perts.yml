  #! Could replace `load` key with `train` key, to start fixing this.
  type: curl
  amp: [0.0, 0.5, 1.0, 2.0, 4.0]  # curl
  # amp: [0.0, 0.05, 0.1, 0.2, 0.4]  # constant


analyses:
  center_out_sets: 
