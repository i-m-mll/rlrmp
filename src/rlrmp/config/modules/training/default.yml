dt: 0.01

where: 
  0: ['step.net.hidden', 'step.net.readout']
  # Example: Stop training the readout weights on iteration 1000
  # 1000: ['step.net.hidden']
n_batches_condition: 10_000
n_batches_baseline: 0
batch_size: 250
learning_rate_0: 0.01
n_scaleup_batches: 0
state_reset_iterations: []
constant_lr_iterations: 0
cosine_annealing_alpha: 1.0
weight_decay: 0.0
# save_model_parameters: 

model:
  n_replicates: 5
  effector_mass: 1.0
  hidden_size: 180
  feedback_delay_steps: 5
  feedback_noise_std: 0.01
  motor_noise_std: 0.01
  # Explicit stochastic-runtime fields. Null preserves the legacy aliases:
  # sensory=feedback_noise_std, signal_dependent=motor_noise_std,
  # additive=1.8*motor_noise_std. Plant process/load noise is a post-filter
  # force disturbance upstream of mechanics, not position/velocity diffusion.
  sensory_noise_std: null
  additive_motor_noise_std: null
  signal_dependent_motor_noise_std: null
  plant_process_force_noise_std: 0.0
  damping: 10.0   #! 10.0
  tau_rise: 0.05  #! 0.05
  # Optional: partition hidden units into subpopulations with different connectivity
  # Uncomment and configure to enable population structure:
  population_structure:
    n_input_only: 60      # units that receive inputs but don't contribute to readout
    n_readout_only: 60    # units that contribute to readout but don't receive inputs
    n_recurrent_only: 60  # units that are internal-only (no input/output)
    n_input_readout: 0   # units that both receive inputs and contribute to readout
    # Note: sum must equal hidden_size (100 in this case)
    # assignment: random  # or provide custom assignment function 

