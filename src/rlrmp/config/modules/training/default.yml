task: 
  #! n_steps should be greater than `sum(r[-1]-1 for r in epoch_len_ranges) + window_bounds[-1]`
  #! to contain the entire post-go-cue window, for all trials
  n_steps: 130  # 10 + 20 + 80 (+ 20)
  workspace: [[-1.0, -1.0], [1.0, 1.0]]  #!
  eval_grid_n: 2
  eval_n_directions: 7
  eval_reach_length: 0.5

  type: delayed_reach

  epoch_len_ranges: 
    - [10, 11]   # pre-target on
    - [5, 20]  # target on, pre-movement
  target_on_epochs: [1, 2]
  hold_epochs: [0, 1]
  move_epochs: [2]
  p_catch_trial: 0.5  

pert:
  type: gusts
  std: 1
  duration_mean: 8
  n_expected: 2

  # type: curl
  # std: 1.5

loss:
  weights:
    goal_hit_in_window: 0.0
    # Quadratic terms:
    effector_pos: 0.0  # simple mode: constant penalty during movement + final vel only
    effector_pos_mid: 1.0  # ramping position penalty during mid-period (optional)
    effector_vel_mid: 0.0  # ramping velocity penalty during mid-period (optional) #! 
    effector_pos_late: 1.0  # late-period position penalty (structured/goal-hit modes)
    effector_vel_late: 0.1  # late-period velocity penalty (structured/goal-hit modes)
    effector_final_vel: 1.0  # final timestep velocity (simple mode only)
    effector_hold_pos: 10.0  # pre-GO position hold
    effector_hold_vel: 10.0  # pre-GO velocity hold
    nn_output: 1e-6  # command/output penalty
    nn_hidden: 1e-6  # network activity penalty
  effector_pos_late:
    start_step_after_go: 80  # timesteps after go cue when late period begins
    final_scale_factor: 3.0  # discount ramp endpoint (1.0 = constant, >1.0 = increasing)
  effector_vel_late:
    start_step_after_go: 80  # timesteps after go cue when late period begins
    final_scale_factor: 3.0  # discount ramp endpoint (1.0 = constant, >1.0 = increasing)
  effector_pos_mid:
    start_step_after_go: 0  # window start (timesteps after go cue)
    end_step_after_go: 80  # window end (timesteps after go cue)
    ramp_init_weight: 0.0  # weight at window start
    ramp_final_weight: 0.1  # weight at window end (before late period)
  effector_vel_mid:
    start_step_after_go: 0  # window start (timesteps after go cue)
    end_step_after_go: 80  # window end (timesteps after go cue)
    ramp_init_weight: 0.0  # weight at window start
    ramp_final_weight: 0.1  # weight at window end (before late period)
  goal_hit_in_window:
    start_step_after_go: 60  # hit window start (timesteps after go cue)
    end_step_after_go: 80  # hit window end (timesteps after go cue)
    softmin_tau: 0.2  # timescale of softmin aggregation
    post_pos_sigma_t: 5  # sigmoid timescale for post-hit position error
    weights:
      pos: 1.0  # position error within hit window
      vel: 0.1  # velocity at estimated hit time
      post_pos: 1.0  # position error after hit time

    # fix_readout_norm: 0.1
  # stop_at_goal:
  #   method: "soft-or"
  #   window_len: 5
  #   std_dist: 0.025
  #   std_vel: 0.05
  #   vel_weight: 1.0
  #   tau: 0.2
  # fix_readout_norm: 1.0

loss_update:
  enabled: true  # Set to true to enable adaptive loss weight updates
  target_ratio: 0.5  # Target ratio: J_u / J_x (control cost / goal error)
  alpha: 0.005  # Update rate (learning rate for weight adjustment)
  control_term: "nn_output"  # Name of control cost term
  goal_term: ["effector_pos_mid", "effector_pos_late"]  # Name(s) of goal error term(s) (summed if list)
  # Iteration to start applying updates (0 = from beginning)
  start_iteration: 0  # Updates will be applied at every iteration >= start_iteration
