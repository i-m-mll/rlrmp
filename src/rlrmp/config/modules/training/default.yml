dt: 0.01

model:
  n_replicates: 5
  effector_mass: 1.0
  hidden_size: 100
  feedback_delay_steps: 0
  feedback_noise_std: 0.01
  motor_noise_std: 0.01
  damping: 10   #!
  tau_rise: 0.05  #! 

task: 
  n_steps: 100
  workspace: [[-1.0, -1.0], [1.0, 1.0]]  #!
  eval_grid_n: 2
  eval_n_directions: 7
  eval_reach_length: 0.5

  type: delayed_reach
  
  epoch_len_ranges: 
    - [10, 11]   # pre-target on
    - [5, 20]  # target on, pre-movement
  target_on_epochs: [1, 2]
  hold_epochs: [0, 1]
  move_epochs: [2]
  p_catch_trial: 0.5  

where: 
  0: ['step.net.hidden', 'step.net.readout']
  # Example: Stop training the readout weights on iteration 1000
  # 1000: ['step.net.hidden']
learning_rate_0: 0.01
n_batches_condition: 10_000
n_batches_baseline: 0
batch_size: 250
n_scaleup_batches: 0
state_reset_iterations: []
constant_lr_iterations: 0
cosine_annealing_alpha: 1.0
weight_decay: 0.0
# save_model_parameters: 

loss:
  weights:
    # effector_stop_at_goal: 1.0
    # effector_fixation: 1.0
    effector_position: 1.0
    effector_final_velocity: 1.0
    nn_output: 1e-5
    nn_hidden: 1e-5
    # fix_readout_norm: 0.1
  # stop_at_goal:
  #   method: "soft-or"
  #   window_len: 5
  #   std_dist: 0.025
  #   std_vel: 0.05
  #   vel_weight: 1.0
  #   tau: 0.2
  # fix_readout_norm: 1.0

pert:
  type: gusts
  std: 1
  duration_mean: 8
  n_expected: 8

  # type: curl
  # std: 1.5