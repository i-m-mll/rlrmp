[project]
name = "rlrmp"
version = "0.1.0"
description = ""
authors = [
    {name = "MLL", email = "mll@mll.bio"}
]
requires-python = ">=3.12"
dependencies = [
    "feedbax-experiments>=0.1.0",
    "statsmodels>=0.14.5",
]

[project.entry-points."feedbax_experiments.packages"]
rlrmp = "rlrmp:register_experiment_package"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
packages = ["src/rlrmp"]

[tool.hatch.build.targets.wheel]
packages = ["src/rlrmp"]

[tool.uv]
config-settings = { editable-mode = "compat" }

[tool.uv.sources.feedbax-experiments]
path = "../41 RNNs learn robust policies"
editable = true

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# Equinox array annotations
ignore = ["F722"]  
# Prevent removal of unused imports
unfixable = ["F401"]  

[tool.ruff.lint.per-file-ignores]
# Scripts often need to run things before importing more things
"src/feedbax_experiments/bin/*.py" = ["E402"] 

[tool.ruff.format]
indent-style = "space"

[tool.pyright]
include = ["src"]
exclude = ["**/__pycache__", ".venv", "archive", "manuscript", "results", "docs"]
typeCheckingMode = "standard"
verboseOutput = true
reportMissingImports = true
