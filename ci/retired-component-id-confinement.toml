[[python_scope]]
path = "src/rlrmp/model/cs_lss_gru.py"
qualname = "<module>"
owner = "7811e47"
category = "cs_lss_component_id_constants"
note = "Module-level CS-LSS component-ID constants and frozensets (registration IDs, migration source_types, unsupported-stochastic set). The finite-epsilon-policy active emission is now Feedbax-native (AffineValueComposer node labelled finite_epsilon_policy; see FINITE_EPSILON_POLICY_GRAPH_COMPONENT); the RLRMPCsLssFiniteEpsilonPolicy constant survives here only as a legacy registration/migration ID so archived graphs still materialize (register_cs_lss_graph_components). CS-LSS initial-hidden / passthrough retirement to native remains pending on the CS-LSS native-migration lane. This <module> scope covers several retired constants, so it cannot narrow to drop just the finite-epsilon constant while legacy loaders reference it."

[[python_scope]]
path = "src/rlrmp/runtime/run_specs.py"
qualname = "<module>"
owner = "7811e47"
category = "legacy_run_spec_validation"
note = "CS_LSS_FEEDBACK_COMPONENT_TYPES and LEGACY_POINT_MASS_GRAPH_TYPES accept historical RLRMP IDs only for archived-artifact validation; clean targets are Feedbax-native (StateFeedbackSelector / PointMass / FeedbackChannels)."

