# Retired GraphSpec component-ID confinement allowlist for issue 7811e47
# (part of umbrella 64a04e0). Enforced by
# tests/test_retired_component_id_scan.py (the terminal-gate retired-ID scan,
# gate check 1 of the 419eed1 semantic-safety gate).
#
# WHAT THIS PINS (and how it differs from the 9728133 re-accretion ratchet)
# -----------------------------------------------------------------------
# The 9728133 ratchet (ci/legacy-pattern-allowlist.toml,
# tests/test_reaccretion_ratchet.py) freezes the *inventory* of branded
# GraphSpec component-ID string VALUES defined in four src modules against
# GROWTH (a new branded ID value fails unless allowlisted). It is value-only;
# location is informational.
#
# This file pins the *locations*. The retired-ID scan asserts inventory-
# complete CONFINEMENT: every occurrence of every retired GraphSpec
# component-ID -- across src/, tests/, production scripts/, and manifest /
# fixture JSON -- must fall inside a bounded, annotated allowlist entry below.
# An occurrence with no covering entry FAILS the scan (a retired ID reappearing
# on an active clean-target path). A stale entry that no longer matches any
# occurrence also FAILS (dead allowlist entries are treated as skips, and skips
# count as failures).
#
# INVENTORY SOURCE OF TRUTH
# -------------------------
# The retired-ID inventory is NOT re-listed here. It is read from the 9728133
# ratchet's [[branded_component_ids]] table (ci/legacy-pattern-allowlist.toml),
# which is exactly the set of RLRMP-branded GraphSpec component-type IDs the
# 64a04e0 migration retires (the point-mass / linear / channel / mechanics
# aliases plus the CS-LSS component IDs). RLRMP-prefixed *schema_kind* /
# materialization-manifest-family strings in src/rlrmp/runtime/spec_migrations.py
# and src/rlrmp/analysis/declarative_materialization.py (e.g.
# "RLRMPGRUEvaluationDiagnosticsManifest", "RLRMPRunSpec") are a SEPARATE
# branding surface, not GraphSpec component types, and are out of scope for both
# the ratchet and this confinement scan.
#
# ENTRY GRAMMAR
# -------------
#   [[python_scope]]  path + qualname : retired IDs may appear as string
#       literals only inside the named enclosing function ("<module>" = module
#       top level, e.g. a constant or frozenset). Gives active-emission teeth in
#       the two mixed model modules where legacy registration / serialization /
#       migration code coexists with native active builders: a retired ID string
#       appearing in ANY other function in those files (e.g. a new active
#       builder) is NOT covered and fails.
#   [[file]]  path : retired IDs may appear anywhere in this whole file
#       (deliberate legacy-assertion / conversion tests; sibling-owned files).
#   [[glob]]  pattern : retired IDs may appear anywhere in files matching the
#       glob (archived / audited fixture + manifest JSON; conversion code).
#
# Every entry carries owner (7-char ledger issue) + category + note.

schema_version = 1
owning_umbrella = "64a04e0"
inventory_source = "ci/legacy-pattern-allowlist.toml#branded_component_ids"

# --- src: legacy registration / serialization / migration code paths --------

[[python_scope]]
path = "src/rlrmp/model/feedbax_graph.py"
qualname = "register_rlrmp_graph_components"
owner = "e23874f"
category = "legacy_registration"
note = "Registers the frozen SimpleStagedNetwork reader; linear recipes were converted to native AffineFeedbackController specs."

[[python_scope]]
